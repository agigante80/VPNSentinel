services:
  vpn-sentinel-server-test:
    build:
      context: ..
      dockerfile: vpn-sentinel-server/Dockerfile
    container_name: vpn-sentinel-server-test
    env_file: .env.test
    ports:
      - "15554:5000"
      - "15553:5001"
      - "18080:8080"
    networks:
      - vpn-sentinel-test
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5001/health || wget -qO- http://127.0.0.1:5000/test/v1/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  vpn-sentinel-client-test:
    build:
      context: ..
      dockerfile: vpn-sentinel-client/Dockerfile
    container_name: vpn-sentinel-client-test
    env_file: .env.test
    environment:
      - VPN_SENTINEL_URL=http://vpn-sentinel-server-test:5000
      - VPN_SENTINEL_CLIENT_ID=test-client-docker
    depends_on:
      vpn-sentinel-server-test:
        condition: service_healthy
    networks:
      - vpn-sentinel-test
    restart: unless-stopped

networks:
  vpn-sentinel-test:
    driver: bridge
